
# Experiment 2a: Open-ended quality fine-tuning with CME-GRPO
# Generator: Qwen2.5-0.5B (base) → train with CME reward
# Verifier: Gemma-4-E4B-it (frozen, bf16)
# Dataset: UltraFeedback (instructions only, 5k subset)
# Eval: LLM judge win rate (finetuned vs base vs instruct)

model:
  generator: google/gemma-3-1b-pt
  verifier: google/gemma-4-E4B-it
  base: google/gemma-3-1b-pt
  instruct: google/gemma-3-1b-it

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512

generation:
  num_generations: 8
  temperature: 1.0
  max_new_tokens: 1536
  top_p: 1.0
  repetition_penalty: 1.25

training:
  learning_rate: 3.0e-6
  max_grad_norm: 1.0
  kl_coef: 0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  num_train_epochs: 1
  max_steps: 3000
  warmup_steps: 20
  logging_steps: 1
  save_steps: 50
  save_total_limit: 2
  eval_steps: 50
  skip_baseline_eval: false
  output_dir: ./outputs/cme-grpo-quality-quality4
  bf16: true
  seed: 42

reward:
  max_verifier_length: 1536
  token_level: true
  answer_only_cme: false
  #no_box_penalty: 5
  reward_metric: entropy

eval:
  max_new_tokens: 1536
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 100

wandb:
  project: cme-grpo
  run_name: quality-quality4