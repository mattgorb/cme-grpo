
# DPO baseline for config_quality2 — same generator, same eval, no verifier.
# Replaces CME-GRPO with DPO on UltraFeedback (chosen/rejected) pairs.

model:
  generator: allenai/OLMo-2-0425-1B-SFT
  # No verifier needed for DPO — preference labels come from the dataset.
  base: allenai/OLMo-2-0425-1B-SFT
  instruct: allenai/OLMo-2-0425-1B-DPO

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512
  max_total_length: 2048

training:
  learning_rate: 5.0e-7        # DPO standard (much lower than RL — direct loss)
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_steps: 3000
  warmup_steps: 50
  logging_steps: 10
  save_steps: 200
  save_total_limit: 2
  eval_steps: 200
  dpo_beta: 0.1                # DPO temperature — standard
  skip_baseline_eval: false
  output_dir: ./outputs/dpo-quality-quality2
  bf16: true
  seed: 42

eval:
  max_new_tokens: 1536
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: dpo-quality2
