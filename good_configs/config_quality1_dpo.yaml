
# DPO baseline for good_configs/config_quality1.yaml.
# Same generator (Qwen2.5-0.5B base), same eval pipeline, no verifier.
# Replaces CME-GRPO with DPO on UltraFeedback (chosen/rejected) pairs.

model:
  generator: Qwen/Qwen2.5-0.5B
  base: Qwen/Qwen2.5-0.5B
  instruct: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512
  max_total_length: 2048

training:
  learning_rate: 5.0e-7        # DPO standard
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_steps: 5000
  warmup_steps: 50
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  eval_steps: 200
  dpo_beta: 0.1                # DPO temperature — standard
  skip_baseline_eval: false
  output_dir: ./outputs/dpo-quality-qwen0.5b
  bf16: true
  seed: 42

eval:
  max_new_tokens: 2048
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: dpo-quality-qwen0.5b
