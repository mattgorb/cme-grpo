
# Experiment 2b (v2): more aggressive hyperparameters for base-model adaptation.
# Key changes vs config_quality2.yaml:
#   - rollout temperature 1.0 → 1.2
#   - learning rate 5e-6 → 1e-5
#   - max_grad_norm 1.0 → 5.0
#   - warmup_steps 20 → 100
#   - gradient_accumulation_steps 128 → 64
#   - output_dir suffix v2

model:
  generator: meta-llama/Llama-3.2-1B
  verifier: google/gemma-3n-E4B-it
  base: meta-llama/Llama-3.2-1B
  instruct: meta-llama/Llama-3.2-1B-Instruct

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512

generation:
  num_generations: 8
  temperature: 1.2
  max_new_tokens: 2048
  top_p: 1.0

training:
  learning_rate: 1.0e-5
  max_grad_norm: 5.0
  kl_coef: 0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 64
  num_train_epochs: 1
  max_steps: 2000
  warmup_steps: 100
  logging_steps: 1
  save_steps: 10
  save_total_limit: 3
  eval_steps: 10
  skip_baseline_eval: false
  output_dir: ./outputs/cme-grpo-quality-llama3-1b-v2
  bf16: true
  seed: 42

reward:
  max_verifier_length: 2048
  token_level: true
  answer_only_cme: false
  reward_metric: entropy

eval:
  max_new_tokens: 2048
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: quality-llama3-1b-v2
