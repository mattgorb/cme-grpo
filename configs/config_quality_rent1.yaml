
# RENT baseline (rent-rl.github.io) — v1, length-fair.
# Same as the original config_quality_rent.yaml but with two changes that
# address the length-collapse failure observed in the first run:
#   - reward uses MEAN-pooled entropy (in build_rent_reward_fn) instead of
#     sum, removing the incentive to shorten outputs.
#   - KL coefficient bumped 0.01 -> 0.05 to anchor more strongly to the ref
#     policy while the new reward direction takes hold.

model:
  generator: Qwen/Qwen2.5-0.5B
  # `verifier` is unused when reward_metric: rent, but the key is read by
  # downstream code; left as a self-reference for safety.
  verifier: Qwen/Qwen2.5-0.5B
  # For three-way LLM judge comparison in eval_quality.py.
  base: Qwen/Qwen2.5-0.5B
  instruct: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512

generation:
  num_generations: 8
  temperature: 1.0
  max_new_tokens: 2048
  top_p: 1.0

training:
  learning_rate: 3.0e-6
  max_grad_norm: 1.0
  kl_coef: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_steps: 5000
  warmup_steps: 20
  logging_steps: 1
  save_steps: 200
  save_total_limit: 3
  eval_steps: 200
  skip_baseline_eval: false
  output_dir: ./outputs/rent1-quality-qwen0.5b
  bf16: true
  seed: 42

reward:
  max_verifier_length: 2048
  token_level: true
  answer_only_cme: false
  reward_metric: rent

eval:
  max_new_tokens: 2048
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: rent1-quality-qwen0.5b
