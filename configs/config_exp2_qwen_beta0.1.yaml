# Rebuttal Exp 2 — beta (KL anchor) sweep, beta=0.1.
# Same as condition A (config_quality6) but with a strong KL anchor to the frozen
# reference. If beta=0.1 both raises win rate AND reduces drift (Exp 4) vs beta=0,
# the anchor claim in App C holds; if not, beta=0 is a justified default.
model:
  generator: Qwen/Qwen2.5-0.5B-Instruct
  verifier: google/gemma-4-E4B-it
  base: Qwen/Qwen2.5-0.5B
  instruct: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512

generation:
  num_generations: 8
  temperature: 1.0
  max_new_tokens: 2048
  top_p: 1.0

training:
  learning_rate: 3.0e-6
  max_grad_norm: 1.0
  kl_coef: 0.1            # <-- strong KL anchor
  advantage_norm: group_std
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_steps: 500
  warmup_steps: 20
  logging_steps: 1
  save_steps: 200
  save_total_limit: 3
  eval_steps: 200
  skip_baseline_eval: false
  output_dir: ./outputs/exp2-qwen-beta0.1
  bf16: true
  seed: 42

reward:
  max_verifier_length: 2048
  token_level: false
  answer_only_cme: false
  reward_metric: entropy

eval:
  max_new_tokens: 2048
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: exp2-qwen-beta0.1
