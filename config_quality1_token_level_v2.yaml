
# Experiment 2a (v2): more aggressive hyperparameters for base-model adaptation.
# Key changes vs config_quality1_token_level.yaml:
#   - rollout temperature 1.0 → 1.2  (more diverse rollouts → larger reward variance)
#   - learning rate 5e-6 → 1e-5      (base models tolerate larger steps)
#   - max_grad_norm 1.0 → 5.0        (let strong signals through)
#   - warmup_steps 20 → 100          (gradual ramp avoids early-step waste)
#   - gradient_accumulation_steps 128 → 64 (2x more updates per epoch)
#   - output_dir suffix v2 to keep separate from earlier run

model:
  generator: Qwen/Qwen2.5-0.5B
  verifier: google/gemma-3n-E4B-it
  base: Qwen/Qwen2.5-0.5B
  instruct: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512

generation:
  num_generations: 8
  temperature: 1.2
  max_new_tokens: 2048
  top_p: 1.0

training:
  learning_rate: 1.0e-5
  max_grad_norm: 5.0
  kl_coef: 0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 64
  num_train_epochs: 1
  max_steps: 2000
  warmup_steps: 100
  logging_steps: 1
  save_steps: 10
  save_total_limit: 3
  eval_steps: 10
  skip_baseline_eval: false
  output_dir: ./outputs/cme-grpo-quality-qwen0.5b-token-level-v2
  bf16: true
  seed: 42

reward:
  max_verifier_length: 2048
  token_level: true
  answer_only_cme: false
  reward_metric: entropy

eval:
  max_new_tokens: 2048
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 50

wandb:
  project: cme-grpo
  run_name: quality-qwen0.5b-token-level-v2
