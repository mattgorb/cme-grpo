
# DPO baseline for config_quality4 — same generator (Gemma-3-1B pretrained).

model:
  generator: google/gemma-3-1b-pt
  base: google/gemma-3-1b-pt
  instruct: google/gemma-3-1b-it

data:
  train_dataset: openbmb/UltraFeedback
  max_train_samples: 5000
  max_prompt_length: 512
  max_total_length: 2048

training:
  learning_rate: 5.0e-7
  max_grad_norm: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  num_train_epochs: 1
  max_steps: 3000
  warmup_steps: 50
  logging_steps: 10
  save_steps: 50
  save_total_limit: 2
  eval_steps: 50
  dpo_beta: 0.1
  skip_baseline_eval: false
  output_dir: ./outputs/dpo-quality-quality4
  bf16: true
  seed: 42

eval:
  max_new_tokens: 1536
  batch_size: 4
  judge_model: gpt-5.2
  judge_num_samples: 100

wandb:
  project: cme-grpo
  run_name: dpo-quality4
